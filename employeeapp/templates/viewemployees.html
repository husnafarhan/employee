<!DOCTYPE html>
<html lang="en">
<head>

    <title>Employees</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center text-primary mb-4">
        Employee List
    </h1>

    <table class="table table-bordered table-hover shadow">

        <thead class="table-dark">

        <tr>

            <th>Image</th>
            <th>Emp ID</th>
            <th>Name</th>
            <th>Department</th>
            <th>Salary</th>
            <th>Designation</th>
            <th>Actions</th>

        </tr>

        </thead>

        <tbody>

        {% for i in employees %}

        <tr>

            <td>
                <img src="{{ i.image.url }}" width="80" height="80" class="rounded-circle">
            </td>

            <td>{{ i.empid }}</td>
            <td>{{ i.name }}</td>
            <td>{{ i.deptname }}</td>
            <td>{{ i.salary }}</td>
            <td>{{ i.designation }}</td>

            <td>

                <a href="/single/{{ i.id }}" class="btn btn-info btn-sm">
                    View
                </a>

                <a href="/update/{{ i.id }}" class="btn btn-warning btn-sm">
                    Update
                </a>

                <a href="/delete/{{ i.id }}" class="btn btn-danger btn-sm">
                    Delete
                </a>

            </td>

        </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
